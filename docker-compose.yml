version: "3.8"

services:
  # ── Flask AI Backend (CNN Model + Grad-CAM)
  ai-backend:
    build:
      context: .
    container_name: fruit-ai-backend
    ports:
      - "5000:5000"      # Next.js gọi http://localhost:5000/api/predict
    volumes:
      # Mount source code để hot-reload khi chỉnh sửa (không cần rebuild)
      - .:/app
    environment:
      - FLASK_ENV=development
      - FLASK_DEBUG=1
    restart: unless-stopped
    # Health check: Docker tự kiểm tra container còn sống không
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s   # TF cần ~30-60s để load mô hình lần đầu
